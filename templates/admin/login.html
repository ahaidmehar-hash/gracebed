<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Grace Bed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-body">

<div class="admin-login-wrap">
  <div class="admin-login-box">
    <h1>Grace <span>Bed</span></h1>
    <p>Admin Dashboard</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <div class="form-group" style="text-align:left;">
        <label class="form-label" style="display:block;margin-bottom:0.5rem;">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter admin password" required autofocus>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:1rem;">Sign In</button>
    </form>
  </div>
</div>

</body>
</html>
